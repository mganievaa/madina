<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madina Ganieva</title>

    <link href="https://fonts.googleapis.com/css2?family=Forum&family=Poppins:wght@400;500&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./src/style.css" rel="stylesheet">

    <style>
        :root {
            --bg: #F1F1F1;
            --text: #1D0000;
            --accent: #8F0000;
            --white: #F1F1F1;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            font-family: 'Poppins', sans-serif;
            color: var(--text);
            overflow-x: hidden;
        }


        .home-section {
            min-height: 100vh;
            background: var(--bg);
            overflow: hidden;
            position: relative;
             padding-bottom: 80px;
        }

        .page-container {
            max-width: 1920px;
            margin: 0 auto;
            padding-left: clamp(24px, 5vw, 160px);
            padding-right: clamp(24px, 5vw, 160px);
        }

        .topbar {
            padding-top: clamp(28px, 4.5vw, 88px);
        }

        .topbar-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-family: 'Forum', serif;
            font-weight: 400;
            font-size: clamp(38px, 4vw, 64px);
            line-height: 1.1;
            color: var(--text);
            text-decoration: none;
            position: relative;
            z-index: 20;
        }

        .nav-desktop {
            display: flex;
            align-items: center;
            gap: clamp(20px, 2vw, 46px);
        }

        .nav-desktop a {
            text-decoration: none;
            color: var(--text);
            font-size: clamp(18px, 2vw, 40px);
            font-weight: 400;
            transition: .2s ease;
        }

        .nav-desktop a:hover {
            color: var(--accent);
        }


        .hero-row {
            min-height: calc(100vh - 140px);
            align-items: center;
        }

        .hero-text {
            max-width: 900px;
            position: relative;
            z-index: 2;
        }

        .hero-kicker {
            margin: 0 0 18px 0;
            font-size: clamp(24px, 2.5vw, 48px);
            line-height: 1.35;
            font-weight: 400;
        }

        .hero-title {
            margin: 0 0 22px 0;
            font-family: 'Forum', serif;
            font-size: clamp(58px, 7vw, 128px);
            line-height: 1.03;
            font-weight: 400;
            color: var(--accent);
        }

        .hero-subtitle {
            margin: 0;
            font-size: clamp(22px, 2.5vw, 48px);
            line-height: 1.35;
            font-weight: 400;
        }

        .hero-visual {
            position: relative;
            min-height: 720px;
        }

        .polaroid-scene {
            position: relative;
            width: min(100%, 700px);
            height: 720px;
            margin-left: auto;
        }

        .outline-frame {
            position: absolute;
            width: 370px;
            height: 520px;
            top: 98px;
            left: 185px;
            border: 5px solid var(--text);
            transform: rotate(8.87deg);
            z-index: 1;
        }

        .polaroid-image {
            position: absolute;
            width: 490px;
            top: 118px;
            left: 78px;
            filter: drop-shadow(16px 24px 18px rgba(0, 0, 0, .25));
            z-index: 2;
            user-select: none;
            pointer-events: none;
        }

        .clip-image {
            position: absolute;
            width: 155px;
            top: 112px;
            left: 410px;
            z-index: 3;
            user-select: none;
            pointer-events: none;
        }



        @media (max-width:1399.98px) {
            .hero-visual {
                min-height: 620px;
            }

            .polaroid-scene {
                height: 620px;
            }

            .outline-frame {
                width: 320px;
                height: 455px;
                top: 88px;
                left: 150px;
            }

            .polaroid-image {
                width: 420px;
                top: 105px;
                left: 70px;
            }

            .clip-image {
                width: 128px;
                top: 95px;
                left: 350px;
            }
        }

        @media (max-width:991.98px) {

            .hero-row {
                min-height: auto;
                padding-top: 30px;
                padding-bottom: 50px;
                row-gap: 30px;
            }

            .hero-text {
                max-width: 520px;
            }

            .hero-kicker {
                font-size: 32px;
                margin-bottom: 18px;
            }

            .hero-title {
                font-size: 110px;
                line-height: .95;
                max-width: 520px;
            }

            .hero-subtitle {
                font-size: 28px;
                max-width: 420px;
            }

            .hero-visual {
                min-height: 520px;
            }

            .polaroid-scene {
                width: 460px;
                max-width: 100%;
                height: 520px;
                margin: 0 auto;
            }

            .outline-frame {
                width: 255px;
                height: 365px;
                top: 78px;
                left: 145px;
                border-width: 4px;
            }

            .polaroid-image {
                width: 340px;
                top: 88px;
                left: 65px;
            }

            .clip-image {
                width: 105px;
                top: 80px;
                left: 300px;
            }
        }

        @media (max-width:428px) {
            .page-container {
                width: 100%;
                padding-left: 50px;
                padding-right: 51px;
            }

            .home-section {
                min-height: 926px;
            }

            .topbar {
                padding-top: 35px;
            }

            .brand {
                font-size: 40px;
                line-height: 44px;
            }


            .hero-row {
                min-height: auto;
                padding-top: 76px;
                padding-bottom: 0;
                row-gap: 0;
            }

            .hero-text {
                max-width: none;
                width: 100%;
            }

            .hero-kicker {
                font-size: 24px;
                line-height: 36px;
                margin: 0 0 28px 0;
            }

            .hero-title {
                font-size: 88px;
                line-height: 80px;
                margin: 0 0 44px 0;
                max-width: 290px;
            }

            .hero-subtitle {
                font-size: 24px;
                line-height: 36px;
                max-width: 255px;
                margin: 0;
            }

            .hero-visual {
                min-height: 360px;
                margin-top: 82px;
            }

            .polaroid-scene {
                width: 100%;
                height: 360px;
                margin: 0;
            }

            .outline-frame {
                width: 222px;
                height: 278px;
                left: 66px;
                top: 17px;
                border: 5px solid var(--text);
                transform: rotate(8.6deg);
            }

            .polaroid-image {
                width: 227px;
                left: 1px;
                top: 50px;
                filter: drop-shadow(8px 12px 12px rgba(0, 0, 0, .25));
            }

            .clip-image {
                width: 82px;
                left: 174px;
                top: 34px;
            }

        }
    </style>
</head>

<body>
    <section class="home-section">
        <div class="page-container">
            <header class="topbar">
                <div class="topbar-inner">
                    <a href="#" class="brand">MG</a>

                    <nav class="nav-desktop">
                        <a href="work.html">WORK</a>
                        <a href="about.html">ABOUT</a>
                    </nav>

                    <button class="burger" aria-label="Open menu">
                        <span></span>
                        <span></span>
                    </button>
                </div>
            </header>

            <div class="row hero-row">
                <div class="col-lg-7 d-flex align-items-center">
                    <div class="hero-text">
                        <p class="hero-kicker">Hi, I’m</p>
                        <h1 class="hero-title">Madina Ganieva</h1>
                        <p class="hero-subtitle">Designer &amp; Digital Media Creator</p>
                    </div>
                </div>

                <div class="col-lg-5">
                    <div class="hero-visual">
                        <div class="polaroid-scene">
                            <div class="outline-frame"></div>
                            <img src="./src/polaroid.png" alt="Polaroid photo" class="img-fluid polaroid-image">
                            <img src="./src/clip.png" alt="Paper clip" class="img-fluid clip-image">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-inner">
            <div class="mobile-menu-top">
                <a href="index.html" class="mobile-brand">MG</a>
                
            </div>

            <nav class="mobile-nav">
                <a href="work.html">WORK</a>
                <a href="about.html">ABOUT</a>
            </nav>
        </div>
    </div>
    <script src="./src/script.js"></script>
</body>

</html>
