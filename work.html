<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Work</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
<link href="./src/style.css" rel="stylesheet">

<style>

:root{
    --bg:#F1F1F1;
    --text:#1D0000;
    --accent:#8F0000;
}

body{
    background:var(--bg);
    font-family:'Poppins',sans-serif;
}

/* container как в index */

.page-container{
    max-width:1920px;
    margin:0 auto;
    padding-left:clamp(24px,5vw,160px);
    padding-right:clamp(24px,5vw,160px);
     padding-bottom: 80px; 
}

.topbar{
    padding-top:clamp(28px,4.5vw,88px);
}

.topbar-inner{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.brand{
    font-family:'Forum',serif;
    font-weight:400;
    font-size:clamp(38px,4vw,64px);
    line-height:1.1;
    color:var(--text);
    text-decoration:none;
}

.nav-desktop{
    display:flex;
    align-items:center;
    gap:clamp(20px,2vw,46px);
}

.nav-desktop a{
    text-decoration:none;
    color:var(--text);
    font-size:clamp(18px,2vw,40px);
    font-weight:400;
    transition:.2s ease;
}

.nav-desktop a:hover{
    color:var(--accent);
}


/* WORK GRID */

.work-card{
    position:relative;
    overflow:hidden;
    border-radius:42px;
}

.work-card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:transform .3s ease;
}

.work-overlay{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(23,23,23,0);
    opacity:0;
    transition:.3s;
}

.work-title{
    color:white;
    font-size:32px;
}

.work-link{
    display:block;
    text-decoration:none;
    color:inherit;
}

.work-card:hover img{
    transform:scale(1.03);
}

.work-card:hover .work-overlay{
    background:rgba(23,23,23,.88);
    opacity:1;
}

/* spacing grid */

.work-grid{
    margin-top:80px;
}

@media(max-width:992px){

.work-title{
    font-size:24px;
}

}

</style>

</head>

<body>

<section class="home-section">

<div class="page-container">

<header class="topbar">

<div class="topbar-inner">

<a href="index.html" class="brand">MG</a>

<nav class="nav-desktop">
<a href="work.html">WORK</a>
<a href="about.html">ABOUT</a>
</nav>

<button class="burger" aria-label="Open menu">
<span></span>
<span></span>
</button>

</div>

</header>


<!-- WORK GRID -->

<div class="work-grid">

<div class="row g-4">

<div class="col-lg-6">

<a href="bahore.html" class="work-link">

<div class="work-card">

<img src="./src/image1.png">

<div class="work-overlay">
<div class="work-title">Bahoré</div>
</div>

</div>

</a>

</div>


<div class="col-lg-6">

<a href="dark.html" class="work-link">

<div class="work-card">

<img src="./src/image2.png">

<div class="work-overlay">
<div class="work-title">Dark Matter</div>
</div>

</div>

</a>

</div>


<div class="col-lg-6">

<a href="kazimir.html" class="work-link">

<div class="work-card">

<img src="./src/image3.png">

<div class="work-overlay">
<div class="work-title">Kazimir Type Specimen</div>
</div>

</div>

</a>

</div>


<div class="col-lg-6">

<a href="lionel.html" class="work-link">

<div class="work-card">

<img src="./src/image4.png">

<div class="work-overlay">
<div class="work-title">Lionel’s Cafe</div>
</div>

</div>

</a>

</div>

</div>

</div>

</div>

</section>


<!-- MOBILE MENU -->

<div class="mobile-menu" id="mobileMenu">

<div class="mobile-menu-inner">

<div class="mobile-menu-top">
<a href="index.html" class="mobile-brand">MG</a>
</div>

<nav class="mobile-nav">
<a href="work.html">WORK</a>
<a href="about.html">ABOUT</a>
</nav>

</div>

</div>


<script src="./src/script.js"></script>

</body>
</html>
